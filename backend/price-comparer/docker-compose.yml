services:
  postgres:
    image: postgres:16
    container_name: price_engine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: price_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d price_engine"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata: