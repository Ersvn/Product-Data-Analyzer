server:
  port: 3001

app:
  dashUser: admin
  dashPass: change-me

  allowedOrigins:
    - "http://localhost:5173"

  data:
    # MARKNAD
    marketPath: "classpath:data/company.mock.json"

    # VÅRT LAGER (dina produkter)
    companyPath: "classpath:data/products.mock.json"
    historyPath: "file:./data/price-history.jsonl"
    auditPath: "file:./data/audit-log.jsonl"
    useEnrichedMarket: false

    # finns kvar men används bara om du uttryckligen väljer det + enrichment använder det
    enrichedMarketPath: "file:./data/products.enriched.json"

    overridesPath: "file:C:/Users/eriks/eclipse-workspace/Product-Data-Analyzer/backend/price-comparer/data/overrides.json"
    autoPersistOverrides: true

# =========================
# Enrichment
# =========================
enrichment:
  enabled: true

  runOnStartup: false

  maxProductsPerRun: 20
  ourPriceFactor: 0.65

  scheduler:
    enabled: false
    cron: "0 0 2 * * *"

# =========================
# Relevansfilter
# =========================
relevance:
  enabled: true
  allowedCategoryKeywords:
    - "monitor"
    - "display"
    - "laptop"
    - "notebook"
    - "workstation"
    - "desktop"
    - "pc"
    - "printer"
    - "laserjet"
    - "toner"
    - "cartridge"
    - "ink"
    - "keyboard"
    - "mouse"
    - "router"
    - "switch"
    - "access point"
    - "headset"
    - "dock"
    - "ssd"
    - "hard drive"
    - "ram"
    - "memory"
    - "gpu"
    - "graphics"
    - "server"
  blockedKeywords:
    - "warranty"
    - "support"
    - "service"
    - "onsite"
    - "nbd"
    - "accidental damage"
    - "travel coverage"
    - "license"
    - "subscription"
    - "protection plan"
    - "extended"
    - "spare"
    - "replacement"
    - "mounting"
    - "cover"
    - "case"
  blockedNameRegex:
    - ".*\\b(NBD|onsite|support|warranty)\\b.*"
    - ".*\\b(\\d+\\s*year|\\d+\\s*yr)\\b.*"
  minScore: 2

cache:
  pricesapi:
    path: "./data/cache/pricesapi"

icecat:
  enabled: true
  path: "file:C:/Users/eriks/Desktop/Icecat/daily.index.xml"
  prefer: high

pricing:
  mode: FIRST_MATCH_WINS   # eller APPLY_ALL

  rules:
    undercutIfCompetition:
      enabled: true
      undercutPercent: 0.01        # 1% under marketMin
      requireCompetitors: true     # bara om competitorCount > 0

    soloMarketPremium:
      enabled: true
      premiumFactor: 0.98          # marketMax * 0.98 när ensam (competitorCount == 0)

    ignoreBelowCostMarket:
      enabled: true

  post:
    psychological90:
      enabled: true
