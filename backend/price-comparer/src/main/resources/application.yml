server:
  port: 3001

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/price_engine
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: false

app:
  storage: DB
  dashUser: admin
  dashPass: change-me
  allowedOrigins:
    - "http://localhost:5173"

  scraper:
    command: node
    script: main-v2.js
    workingDir: C:/Users/eriks/eclipse-workspace/Product-Data-Analyzer/scraper

  data:
    marketPath: "classpath:data/market.mock.json"
    companyPath: "classpath:data/inventory.mock.json"
    auditPath: "file:./data/audit-log.jsonl"
    useEnrichedMarket: false

cache:
  pricesapi:
    path: "./data/cache/pricesapi"

pricing:
  mode: FIRST_MATCH_WINS
  rules:
    undercutIfCompetition:
      enabled: true
      undercutPercent: 0.01
      requireCompetitors: true
    soloMarketPremium:
      enabled: true
      premiumFactor: 0.98
    ignoreBelowCostMarket:
      enabled: true
  post:
    psychological90:
      enabled: true

logging:
  level:
    org.springframework.jdbc.datasource: INFO
    com.zaxxer.hikari: INFO