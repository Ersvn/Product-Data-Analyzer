server:
  port: 3001

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/price_engine
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  dashUser: admin
  dashPass: change-me
  storage: DB   # FILES|DB
  allowedOrigins:
    - "http://localhost:5173"

  data:
    marketPath: "classpath:data/market.mock.json"
    companyPath: "classpath:data/inventory.mock.json"
    historyPath: "file:./data/price-history.jsonl"
    auditPath: "file:./data/audit-log.jsonl"
    useEnrichedMarket: false
    enrichedMarketPath: "file:./data/products.enriched.json"

    overridesPath: "file:C:/Users/eriks/eclipse-workspace/Product-Data-Analyzer/backend/price-comparer/data/overrides.json"
    autoPersistOverrides: true

enrichment:
  enabled: true
  runOnStartup: false
  maxProductsPerRun: 20
  ourPriceFactor: 0.65
  scheduler:
    enabled: false
    cron: "0 0 2 * * *"

relevance:
  enabled: true
  allowedCategoryKeywords:
    - "monitor"
    - "display"
    - "laptop"
    - "notebook"
    - "workstation"
    - "desktop"
    - "pc"
    - "printer"
    - "laserjet"
    - "toner"
    - "cartridge"
    - "ink"
    - "keyboard"
    - "mouse"
    - "router"
    - "switch"
    - "access point"
    - "headset"
    - "dock"
    - "ssd"
    - "hard drive"
    - "ram"
    - "memory"
    - "gpu"
    - "graphics"
    - "server"

  blockedKeywords:
    - "warranty"
    - "support"
    - "service"
    - "onsite"
    - "nbd"
    - "accidental damage"
    - "travel coverage"
    - "license"
    - "subscription"
    - "protection plan"
    - "extended"
    - "spare"
    - "replacement"
    - "mounting"
    - "cover"
    - "case"

  blockedNameRegex:
    - ".*\\b(NBD|onsite|support|warranty)\\b.*"
    - ".*\\b(\\d+\\s*year|\\d+\\s*yr)\\b.*"

  minScore: 2

cache:
  pricesapi:
    path: "./data/cache/pricesapi"

icecat:
  enabled: false
  path: "file:C:/Users/eriks/Desktop/Icecat/daily.index.xml"
  prefer: high

pricing:
  mode: FIRST_MATCH_WINS
  rules:
    undercutIfCompetition:
      enabled: true
      undercutPercent: 0.01
      requireCompetitors: true
    soloMarketPremium:
      enabled: true
      premiumFactor: 0.98
    ignoreBelowCostMarket:
      enabled: true
  post:
    psychological90:
      enabled: true

dashboard:
  queues:
    underpriced:
      marketMovePercent: 0.01


logging:
  level:
    org.springframework.jdbc.datasource: DEBUG
    com.zaxxer.hikari: DEBUG